<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VyM Scheduler — Descargar</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      max-width: 420px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #71717a; margin: 0 0 28px; line-height: 1.5; }
    .version { color: #3f3f46; font-weight: 600; }
    a.btn {
      display: block;
      background: #18181b;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity .15s ease;
    }
    a.btn:hover { opacity: .9; }
    .note { font-size: 12px; color: #a1a1aa; margin: 16px 0 0; }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">📥</div>
    <h1>Descargar VyM Scheduler</h1>
    <p>
      Última versión: <span class="version" id="version">cargando…</span><br />
      Hacé clic en el botón para bajar el instalador para Windows.
    </p>
    <!-- FASE 2: /download redirige siempre al .exe de la última versión (lee latest.yml). -->
    <a class="btn" href="/download">
      Descargar instalador (.exe)
    </a>
    <p class="note">
      Una vez descargado, cerrá el programa, ejecutá el instalador y seguí los pasos.
    </p>
  </main>
  <script>
    // Muestra la última versión sin hardcodearla (la resuelve la Pages Function).
    fetch('/version')
      .then(function (r) { return r.json(); })
      .then(function (d) {
        document.getElementById('version').textContent = d.version || 'la más reciente';
      })
      .catch(function () {
        document.getElementById('version').textContent = 'la más reciente';
      });
  </script>
</body>
</html>
